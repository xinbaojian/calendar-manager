[server]
host = "127.0.0.1"
port = 8080

[database]
path = "./data/calendar.db"

[auth]
# IMPORTANT: Change this to a secure random key before deploying!
# Generate with: python3 -c "import secrets; print(secrets.token_hex(32))"
admin_api_key = "placeholder-change-before-deploy"

[cleanup]
check_interval_hours = 1
auto_delete_expired_days = 30

[webhook]
timeout_seconds = 10
max_retries = 3
