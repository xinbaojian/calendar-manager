<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalendarSync</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════════════
           DESIGN SYSTEM — CalendarSync
           Aesthetic: Midnight Editorial — refined dark theme
           with warm gold accents, crisp typography, and
           purposeful micro-interactions.
        ═══════════════════════════════════════════════════ */
        :root {
            --bg-base: #0B0D11;
            --bg-elevated: #12151B;
            --bg-surface: #1A1E27;
            --bg-surface-hover: #222733;
            --bg-input: #15181F;
            --border-subtle: rgba(255,255,255,0.06);
            --border-default: rgba(255,255,255,0.10);
            --border-focus: rgba(212,175,125,0.5);
            --text-primary: #EDEEF2;
            --text-secondary: #8B8F9A;
            --text-tertiary: #555861;
            --accent: #D4AF7D;
            --accent-hover: #E0C49A;
            --accent-subtle: rgba(212,175,125,0.10);
            --accent-glow: rgba(212,175,125,0.15);
            --danger: #E8574A;
            --danger-hover: #F06B5F;
            --danger-subtle: rgba(232,87,74,0.10);
            --success: #5BAD7A;
            --success-subtle: rgba(91,173,122,0.10);
            --info: #5B9FE8;
            --info-subtle: rgba(91,159,232,0.10);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --font-display: 'Playfair Display', Georgia, serif;
            --font-body: 'DM Sans', system-ui, sans-serif;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.5);
            --shadow-glow: 0 0 20px rgba(212,175,125,0.08);
            --transition-fast: 150ms cubic-bezier(0.4,0,0.2,1);
            --transition-normal: 250ms cubic-bezier(0.4,0,0.2,1);
            --transition-slow: 400ms cubic-bezier(0.4,0,0.2,1);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html { font-size: 16px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

        body {
            font-family: var(--font-body);
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Scrollbar ─────────────────────────────── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

        /* ── Typography ────────────────────────────── */
        h1, h2, h3 { font-family: var(--font-body); font-weight: 600; letter-spacing: -0.02em; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-hover); }

        /* ═══════════════════════════════════════════════
           LOGIN PAGE
        ═══════════════════════════════════════════════ */
        #loginPage {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        #loginPage::before {
            content: '';
            position: absolute;
            top: -40%;
            left: -20%;
            width: 80%;
            height: 80%;
            background: radial-gradient(circle, rgba(212,175,125,0.04) 0%, transparent 70%);
            pointer-events: none;
        }

        #loginPage::after {
            content: '';
            position: absolute;
            bottom: -30%;
            right: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(91,159,232,0.03) 0%, transparent 70%);
            pointer-events: none;
        }

        .login-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-xl);
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 1;
            animation: loginAppear 600ms var(--transition-slow) both;
        }

        @keyframes loginAppear {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-brand {
            text-align: center;
            margin-bottom: 36px;
        }

        .login-brand h1 {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--accent) 0%, var(--text-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-brand p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 6px;
        }

        .login-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: var(--text-tertiary);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .login-divider::before,
        .login-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-default);
        }

        .login-error {
            background: var(--danger-subtle);
            border: 1px solid rgba(232,87,74,0.2);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            font-size: 13px;
            color: var(--danger);
            margin-bottom: 16px;
            display: none;
        }

        .login-error.show { display: block; animation: shake 400ms ease; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .form-field { margin-bottom: 20px; }

        .form-field label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 11px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 14px;
            font-family: var(--font-body);
            transition: all var(--transition-fast);
            outline: none;
        }

        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-subtle);
        }

        .form-input::placeholder { color: var(--text-tertiary); }

        .form-input.error { border-color: var(--danger); box-shadow: 0 0 0 3px var(--danger-subtle); }

        textarea.form-input { resize: vertical; min-height: 80px; }

        /* ═══════════════════════════════════════════════
           BUTTONS
        ═══════════════════════════════════════════════ */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            font-family: var(--font-body);
            cursor: pointer;
            transition: all var(--transition-fast);
            outline: none;
            white-space: nowrap;
            user-select: none;
        }

        .btn:active { transform: scale(0.97); }

        .btn-primary {
            background: var(--accent);
            color: #0B0D11;
            font-weight: 600;
        }
        .btn-primary:hover { background: var(--accent-hover); box-shadow: var(--shadow-glow); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-secondary {
            background: var(--bg-surface);
            color: var(--text-primary);
            border-color: var(--border-default);
        }
        .btn-secondary:hover { background: var(--bg-surface-hover); border-color: rgba(255,255,255,0.15); }

        .btn-danger {
            background: var(--danger-subtle);
            color: var(--danger);
            border-color: rgba(232,87,74,0.2);
        }
        .btn-danger:hover { background: rgba(232,87,74,0.18); }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            padding: 8px 12px;
        }
        .btn-ghost:hover { color: var(--text-primary); background: var(--bg-surface); }

        .btn-sm { padding: 7px 14px; font-size: 13px; }

        .btn-block { width: 100%; }

        .btn-login {
            width: 100%;
            padding: 13px;
            font-size: 15px;
            margin-top: 8px;
        }

        .btn-loading .btn-text { opacity: 0; }
        .btn-loading .btn-spinner { display: block; }
        .btn-spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 600ms linear infinite;
            position: absolute;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ═══════════════════════════════════════════════
           APP LAYOUT
        ═══════════════════════════════════════════════ */
        #appShell { display: none; min-height: 100vh; }
        #appShell.visible { display: block; animation: fadeIn 400ms ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .app-header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(11,13,17,0.82);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
        }

        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 28px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .header-brand {
            font-family: var(--font-display);
            font-size: 18px;
            font-weight: 900;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            text-decoration: none;
        }

        .header-nav { display: flex; gap: 4px; }

        .header-nav a {
            position: relative;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all var(--transition-fast);
        }

        .header-nav a:hover { color: var(--text-primary); background: var(--bg-surface); }

        .header-nav a.active {
            color: var(--accent);
            background: var(--accent-subtle);
        }

        .header-right { display: flex; align-items: center; gap: 16px; }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 14px 6px 10px;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 100px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent) 0%, #B8935A 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: #0B0D11;
        }

        .admin-tag {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            background: var(--accent-subtle);
            border: 1px solid rgba(212,175,125,0.15);
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.04em;
        }

        /* ── Main Content ──────────────────────────── */
        .app-main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 28px;
        }

        .page-view { display: none; }
        .page-view.active { display: block; animation: pageEnter 300ms ease; }

        @keyframes pageEnter {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 4px;
        }

        /* ═══════════════════════════════════════════════
           CARDS & PANELS
        ═══════════════════════════════════════════════ */
        .card {
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 24px;
        }

        .card + .card { margin-top: 20px; }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
        }

        .card-title-sub {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 400;
            margin-top: 2px;
        }

        /* ── Subscription Panel ────────────────────── */
        .subscribe-panel {
            background: linear-gradient(135deg, var(--bg-elevated) 0%, rgba(212,175,125,0.03) 100%);
            border: 1px solid rgba(212,175,125,0.1);
        }

        .subscribe-url-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-base);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-sm);
            padding: 4px 4px 4px 14px;
        }

        .subscribe-url-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 13px;
            outline: none;
            min-width: 0;
        }

        /* ═══════════════════════════════════════════════
           EVENT LIST
        ═══════════════════════════════════════════════ */
        .event-list { display: flex; flex-direction: column; }

        .event-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 20px;
            border-bottom: 1px solid var(--border-subtle);
            transition: background var(--transition-fast);
            animation: listSlideIn 300ms ease both;
        }

        .event-item:last-child { border-bottom: none; }
        .event-item:hover { background: var(--bg-surface); }

        @keyframes listSlideIn {
            from { opacity: 0; transform: translateX(-8px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .event-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
            box-shadow: 0 0 8px rgba(212,175,125,0.3);
        }

        .event-body { flex: 1; min-width: 0; }

        .event-title-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
        }

        .event-title {
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .event-status {
            padding: 2px 8px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .event-status.active { background: var(--success-subtle); color: var(--success); }
        .event-status.cancelled { background: var(--danger-subtle); color: var(--danger); }
        .event-status.expired { background: rgba(255,255,255,0.05); color: var(--text-tertiary); }

        .event-desc {
            font-size: 13px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 500px;
        }

        .event-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
            color: var(--text-tertiary);
            margin-top: 6px;
        }

        .event-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .event-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .event-item:hover .event-actions { opacity: 1; }

        /* ── Webhook List ──────────────────────────── */
        .webhook-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 20px;
            border-bottom: 1px solid var(--border-subtle);
            transition: background var(--transition-fast);
        }

        .webhook-item:last-child { border-bottom: none; }
        .webhook-item:hover { background: var(--bg-surface); }

        .webhook-status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .webhook-status-dot.active { background: var(--success); box-shadow: 0 0 8px rgba(91,173,122,0.3); }
        .webhook-status-dot.inactive { background: var(--text-tertiary); }

        .webhook-body { flex: 1; min-width: 0; }
        .webhook-url {
            font-size: 14px;
            font-weight: 500;
            font-family: 'SF Mono', 'Fira Code', monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .webhook-events {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            flex-wrap: wrap;
        }
        .webhook-event-tag {
            padding: 2px 8px;
            background: var(--info-subtle);
            border-radius: 100px;
            font-size: 11px;
            color: var(--info);
            font-weight: 500;
        }

        /* ═══════════════════════════════════════════════
           USERS TABLE (Admin)
        ═══════════════════════════════════════════════ */
        .users-table {
            width: 100%;
            border-collapse: collapse;
        }

        .users-table th {
            text-align: left;
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            border-bottom: 1px solid var(--border-default);
        }

        .users-table td {
            padding: 14px 16px;
            font-size: 14px;
            border-bottom: 1px solid var(--border-subtle);
        }

        .users-table tr:hover td { background: var(--bg-surface); }
        .users-table tr:last-child td { border-bottom: none; }

        /* ═══════════════════════════════════════════════
           MODAL
        ═══════════════════════════════════════════════ */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active { display: flex; animation: modalBgIn 200ms ease; }

        @keyframes modalBgIn { from { opacity: 0; } to { opacity: 1; } }

        .modal {
            background: var(--bg-elevated);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-xl);
            padding: 32px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalIn 300ms cubic-bezier(0.16,1,0.3,1);
            box-shadow: var(--shadow-lg);
        }

        @keyframes modalIn {
            from { opacity: 0; transform: translateY(16px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .modal-header h2 { font-size: 18px; font-weight: 700; }

        .modal-close {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: var(--bg-surface);
            color: var(--text-secondary);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 18px;
            transition: all var(--transition-fast);
        }

        .modal-close:hover { color: var(--text-primary); background: var(--bg-surface-hover); }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 28px;
        }

        /* ═══════════════════════════════════════════════
           SETTINGS PAGE
        ═══════════════════════════════════════════════ */
        .settings-section { margin-bottom: 32px; }
        .settings-section:last-child { margin-bottom: 0; }

        .settings-section h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .settings-section p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .api-key-display {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg-base);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-sm);
            padding: 4px 4px 4px 14px;
        }

        .api-key-display code {
            flex: 1;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 13px;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .password-form {
            max-width: 360px;
        }

        .password-form .form-field { margin-bottom: 16px; }

        /* ═══════════════════════════════════════════════
           TOAST
        ═══════════════════════════════════════════════ */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 20px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            background: var(--bg-surface);
            border: 1px solid var(--border-default);
            box-shadow: var(--shadow-lg);
            animation: toastIn 300ms cubic-bezier(0.16,1,0.3,1);
            max-width: 360px;
        }

        .toast.exit { animation: toastOut 200ms ease forwards; }

        .toast.success { border-color: rgba(91,173,122,0.3); background: rgba(91,173,122,0.12); }
        .toast.error { border-color: rgba(232,87,74,0.3); background: rgba(232,87,74,0.12); }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(12px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes toastOut {
            to { opacity: 0; transform: translateY(8px) scale(0.95); }
        }

        /* ═══════════════════════════════════════════════
           EMPTY & LOADING STATES
        ═══════════════════════════════════════════════ */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 16px;
            border-radius: 50%;
            background: var(--bg-surface);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: var(--text-tertiary);
        }

        .empty-state h3 { font-size: 16px; color: var(--text-secondary); margin-bottom: 6px; }
        .empty-state p { font-size: 14px; color: var(--text-tertiary); }

        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 60px 20px;
        }

        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border-default);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 700ms linear infinite;
        }

        .loading-state span { font-size: 14px; color: var(--text-tertiary); }

        /* ── Recurrence Checkbox Styles ───────────────── */
        input[type="checkbox"].recurrence-byday {
            width: 16px; height: 16px;
            cursor: pointer;
            accent-color: var(--accent);
        }

        /* ═══════════════════════════════════════════════
           RESPONSIVE
        ═══════════════════════════════════════════════ */
        @media (max-width: 768px) {
            .header-inner { padding: 0 16px; }
            .header-nav { gap: 0; }
            .header-nav a { padding: 8px 10px; font-size: 13px; }

            .page-header { flex-direction: column; align-items: flex-start; gap: 12px; }
            .users-table { font-size: 13px; }
        }
    </style>
</head>

<script>
// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const API_BASE = window.location.origin;

let state = {
    token: null,
    user: null,        // { id, username, is_admin }
    apiKey: null,
    editingEventId: null,
    editingWebhookId: null,
};

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
(function init() {
    const token = localStorage.getItem('cs_token');
    if (token) {
        try {
            const payload = JSON.parse(atob(token.split('.')[1]));
            if (payload.exp * 1000 > Date.now()) {
                state.token = token;
                state.user = { id: payload.sub, username: payload.username, is_admin: payload.is_admin };
                enterApp();
                return;
            }
        } catch (e) { /* token invalid */ }
        localStorage.removeItem('cs_token');
    }
    showLogin();
})();

// ═══════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════
async function handleLogin(e) {
    e.preventDefault();
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('loginBtn');
    const errEl = document.getElementById('loginError');

    errEl.classList.remove('show');
    setButtonLoading(btn, true);

    try {
        const res = await fetch(`${API_BASE}/api/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password }),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data?.error?.message || '登录失败');

        state.token = data.token;
        state.user = data.user;
        localStorage.setItem('cs_token', data.token);
        enterApp();
    } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.add('show');
    } finally {
        setButtonLoading(btn, false);
    }
}

function handleLogout() {
    state = { token: null, user: null, apiKey: null, editingEventId: null, editingWebhookId: null };
    localStorage.removeItem('cs_token');
    showLogin();
}

function showLogin() {
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('appShell').classList.remove('visible');
}

function enterApp() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('appShell').classList.add('visible');

    // Set user info in header
    document.getElementById('userAvatar').textContent = state.user.username.charAt(0).toUpperCase();
    document.getElementById('userName').textContent = state.user.username;
    document.getElementById('adminTag').style.display = state.user.is_admin ? 'inline-flex' : 'none';
    document.getElementById('navUsers').style.display = state.user.is_admin ? '' : 'none';

    // Subscription URL
    document.getElementById('subscriptionUrl').value =
        `${window.location.origin}/calendar/${state.user.id}/subscribe.ics`;

    // Navigate
    handleRoute();
}

// ═══════════════════════════════════════════════════════
// API HELPER
// ═══════════════════════════════════════════════════════
function authHeaders(json = true) {
    const h = { 'Authorization': `Bearer ${state.token}` };
    if (json) h['Content-Type'] = 'application/json';
    return h;
}

async function apiFetch(path, opts = {}) {
    const res = await fetch(`${API_BASE}${path}`, {
        ...opts,
        headers: { ...authHeaders(opts.body !== undefined), ...opts.headers },
    });
    if (res.status === 204) return null;
    const data = await res.json();
    if (!res.ok) throw new Error(data?.error?.message || '请求失败');
    return data;
}

// ═══════════════════════════════════════════════════════
// SPA ROUTER
// ═══════════════════════════════════════════════════════
function handleRoute() {
    if (!state.user) return;
    const hash = location.hash.slice(1) || '/';
    const views = { '/': 'events', '/webhooks': 'webhooks', '/users': 'users', '/settings': 'settings' };
    const route = views[hash] || 'events';

    document.querySelectorAll('.page-view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.header-nav a').forEach(a => a.classList.remove('active'));

    const view = document.getElementById('view' + route.charAt(0).toUpperCase() + route.slice(1));
    if (view) view.classList.add('active');

    const navLink = document.querySelector(`.header-nav a[data-nav="${route}"]`);
    if (navLink) navLink.classList.add('active');

    // Load data
    if (route === 'events') loadEvents();
    if (route === 'webhooks') loadWebhooks();
    if (route === 'users' && state.user.is_admin) loadUsers();
    if (route === 'settings') loadSettings();
}

window.addEventListener('hashchange', handleRoute);

// ═══════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════
async function loadEvents() {
    const listEl = document.getElementById('eventsList');
    try {
        const events = await apiFetch('/api/events');
        const active = events.filter(e => e.status === 'active');

        document.getElementById('eventCount').textContent = `共 ${active.length} 个活跃日程`;

        if (active.length === 0) {
            listEl.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                    </div>
                    <h3>暂无日程</h3>
                    <p>点击"新建日程"创建第一个日程</p>
                </div>`;
            return;
        }

        listEl.innerHTML = '<div class="event-list">' + active.map((ev, i) => `
            <div class="event-item" style="animation-delay:${i * 40}ms">
                <div class="event-dot"></div>
                <div class="event-body">
                    <div class="event-title-row">
                        <span class="event-title">${escapeHtml(ev.title)}</span>
                        <span class="event-status ${ev.status}">${statusText(ev.status)}</span>
                    </div>
                    ${ev.description ? `<div class="event-desc">${escapeHtml(ev.description)}</div>` : ''}
                    <div class="event-meta">
                        <span>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                            </svg>
                            ${formatDateTime(ev.start_time)} — ${formatDateTime(ev.end_time)}
                        </span>
                        ${ev.location ? `<span>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>
                            </svg>
                            ${escapeHtml(ev.location)}
                        </span>` : ''}
                    </div>
                </div>
                <div class="event-actions">
                    <button class="btn btn-secondary btn-sm" onclick="editEvent('${ev.id}')">编辑</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteEvent('${ev.id}')">删除</button>
                </div>
            </div>
        `).join('') + '</div>';
    } catch (err) {
        listEl.innerHTML = `<div class="empty-state"><h3>加载失败</h3><p>${escapeHtml(err.message)}</p></div>`;
    }
}

function openEventModal(id) {
    state.editingEventId = id || null;
    const title = document.getElementById('eventModalTitle');
    title.textContent = id ? '编辑日程' : '新建日程';
    document.getElementById('eventForm').reset();

    if (id) {
        // Fill form with event data
        apiFetch(`/api/events/${id}`).then(ev => {
            document.getElementById('eventTitle').value = ev.title;
            document.getElementById('eventDesc').value = ev.description || '';
            document.getElementById('eventLocation').value = ev.location || '';
            document.getElementById('eventStart').value = ev.start_time.slice(0, 16);
            document.getElementById('eventEnd').value = ev.end_time.slice(0, 16);
        }).catch(() => toast('加载日程失败', 'error'));
    }

    openModal('eventModal');
}

async function editEvent(id) { openEventModal(id); }

async function handleSaveEvent(e) {
    e.preventDefault();
    const btn = document.getElementById('eventSaveBtn');
    setButtonLoading(btn, true);

    const eventData = {
        title: document.getElementById('eventTitle').value,
        description: document.getElementById('eventDesc').value || null,
        location: document.getElementById('eventLocation').value || null,
        start_time: new Date(document.getElementById('eventStart').value).toISOString(),
        end_time: new Date(document.getElementById('eventEnd').value).toISOString(),
    };

    try {
        if (state.editingEventId) {
            await apiFetch(`/api/events/${state.editingEventId}`, {
                method: 'PUT',
                body: JSON.stringify(eventData),
            });
            toast('日程已更新', 'success');
        } else {
            await apiFetch('/api/events', {
                method: 'POST',
                body: JSON.stringify({ event: eventData }),
            });
            toast('日程已创建', 'success');
        }
        closeModal('eventModal');
        loadEvents();
    } catch (err) {
        toast(err.message, 'error');
    } finally {
        setButtonLoading(btn, false);
    }
}

async function deleteEvent(id) {
    if (!confirm('确定要删除这个日程吗？此操作不可撤销。')) return;
    try {
        await apiFetch(`/api/events/${id}`, { method: 'DELETE' });
        toast('日程已删除', 'success');
        loadEvents();
    } catch (err) {
        toast(err.message, 'error');
    }
}

// ═══════════════════════════════════════════════════════
// WEBHOOKS
// ═══════════════════════════════════════════════════════
async function loadWebhooks() {
    const listEl = document.getElementById('webhooksList');
    try {
        const webhooks = await apiFetch('/api/webhooks');
        if (webhooks.length === 0) {
            listEl.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
                        </svg>
                    </div>
                    <h3>暂无 Webhook</h3>
                    <p>创建 Webhook 以接收日程变更通知</p>
                </div>`;
            return;
        }

        listEl.innerHTML = webhooks.map(wh => `
            <div class="webhook-item">
                <div class="webhook-status-dot ${wh.is_active ? 'active' : 'inactive'}"></div>
                <div class="webhook-body">
                    <div class="webhook-url">${escapeHtml(wh.url)}</div>
                    <div class="webhook-events">
                        ${wh.events.map(e => `<span class="webhook-event-tag">${e}</span>`).join('')}
                    </div>
                </div>
                <div style="display:flex;gap:6px;flex-shrink:0;">
                    <button class="btn btn-secondary btn-sm" onclick="deleteWebhook('${wh.id}')">删除</button>
                </div>
            </div>
        `).join('');
    } catch (err) {
        listEl.innerHTML = `<div class="empty-state"><h3>加载失败</h3><p>${escapeHtml(err.message)}</p></div>`;
    }
}

function openWebhookModal() {
    document.getElementById('webhookForm').reset();
    document.getElementById('webhookEvtCreate').checked = true;
    document.getElementById('webhookEvtUpdate').checked = false;
    document.getElementById('webhookEvtDelete').checked = false;
    state.editingWebhookId = null;
    openModal('webhookModal');
}

async function handleSaveWebhook(e) {
    e.preventDefault();
    const btn = document.getElementById('webhookSaveBtn');
    setButtonLoading(btn, true);

    const events = [];
    if (document.getElementById('webhookEvtCreate').checked) events.push('event.created');
    if (document.getElementById('webhookEvtUpdate').checked) events.push('event.updated');
    if (document.getElementById('webhookEvtDelete').checked) events.push('event.deleted');

    if (events.length === 0) {
        toast('请至少选择一个事件类型', 'error');
        setButtonLoading(btn, false);
        return;
    }

    const body = {
        webhook: {
            url: document.getElementById('webhookUrl').value,
            events,
            secret: document.getElementById('webhookSecret').value || null,
        },
    };

    try {
        await apiFetch('/api/webhooks', { method: 'POST', body: JSON.stringify(body) });
        toast('Webhook 已创建', 'success');
        closeModal('webhookModal');
        loadWebhooks();
    } catch (err) {
        toast(err.message, 'error');
    } finally {
        setButtonLoading(btn, false);
    }
}

async function deleteWebhook(id) {
    if (!confirm('确定要删除这个 Webhook 吗？')) return;
    try {
        await apiFetch(`/api/webhooks/${id}`, { method: 'DELETE' });
        toast('Webhook 已删除', 'success');
        loadWebhooks();
    } catch (err) {
        toast(err.message, 'error');
    }
}

// ═══════════════════════════════════════════════════════
// USERS (Admin)
// ═══════════════════════════════════════════════════════
async function loadUsers() {
    const listEl = document.getElementById('usersList');
    try {
        const users = await apiFetch('/api/users');
        listEl.innerHTML = `
            <table class="users-table">
                <thead>
                    <tr>
                        <th>用户名</th>
                        <th>角色</th>
                        <th>创建时间</th>
                        <th style="text-align:right;">操作</th>
                    </tr>
                </thead>
                <tbody>
                    ${users.map(u => `
                        <tr>
                            <td style="font-weight:500;">${escapeHtml(u.username)}</td>
                            <td>
                                ${u.is_admin
                                    ? '<span class="admin-tag">Admin</span>'
                                    : '<span style="color:var(--text-tertiary);font-size:13px;">User</span>'}
                            </td>
                            <td style="color:var(--text-tertiary);font-size:13px;">${formatDate(u.created_at)}</td>
                            <td style="text-align:right;">
                                <button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}','${escapeHtml(u.username)}')">删除</button>
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>`;
    } catch (err) {
        listEl.innerHTML = `<div class="empty-state"><h3>加载失败</h3><p>${escapeHtml(err.message)}</p></div>`;
    }
}

function openUserModal() {
    document.getElementById('userForm').reset();
    openModal('userModal');
}

async function handleCreateUser(e) {
    e.preventDefault();
    const btn = document.getElementById('userSaveBtn');
    setButtonLoading(btn, true);

    const body = {
        username: document.getElementById('newUsername').value.trim(),
        password: document.getElementById('newUserPassword').value,
        is_admin: document.getElementById('newUserAdmin').checked,
    };

    try {
        const result = await apiFetch('/api/users', { method: 'POST', body: JSON.stringify(body) });
        closeModal('userModal');
        toast(`用户 ${body.username} 已创建，API Key: ${result.api_key}`, 'success');
        loadUsers();
    } catch (err) {
        toast(err.message, 'error');
    } finally {
        setButtonLoading(btn, false);
    }
}

async function deleteUser(id, username) {
    if (!confirm(`确定要删除用户 "${username}" 吗？此操作不可撤销。`)) return;
    try {
        await apiFetch(`/api/users/${id}`, { method: 'DELETE' });
        toast('用户已删除', 'success');
        loadUsers();
    } catch (err) {
        toast(err.message, 'error');
    }
}

// ═══════════════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════════════
async function loadSettings() {
    // Load API key from user info
    try {
        const res = await apiFetch('/api/auth/api-key');
        state.apiKey = res.api_key;
        document.getElementById('apiKeyDisplay').textContent = maskKey(res.api_key);
    } catch (err) {
        document.getElementById('apiKeyDisplay').textContent = '无法获取 API Key';
    }
}

function maskKey(key) {
    if (!key || key.length <= 8) return key;
    return key.slice(0, 4) + '••••••••' + key.slice(-4);
}

async function handleRegenerateApiKey() {
    if (!confirm('重新生成 API Key 后，旧 Key 将立即失效。确定继续？')) return;
    try {
        const res = await apiFetch('/api/auth/api-key', { method: 'POST' });
        state.apiKey = res.api_key;
        document.getElementById('apiKeyDisplay').textContent = res.api_key;
        toast('API Key 已重新生成，请立即复制保存', 'success');
    } catch (err) {
        toast(err.message, 'error');
    }
}

function copyApiKey() {
    if (!state.apiKey) {
        toast('请先加载 API Key', 'error');
        return;
    }
    navigator.clipboard.writeText(state.apiKey).then(
        () => toast('API Key 已复制', 'success'),
        () => toast('复制失败', 'error')
    );
}

async function handleChangePassword() {
    const current = document.getElementById('currentPassword').value;
    const newPwd = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmPassword').value;

    if (!current || !newPwd) {
        toast('请填写当前密码和新密码', 'error');
        return;
    }

    if (newPwd !== confirm) {
        toast('两次输入的新密码不一致', 'error');
        return;
    }

    if (newPwd.length < 6) {
        toast('新密码至少需要 6 个字符', 'error');
        return;
    }

    try {
        await apiFetch('/api/auth/change-password', {
            method: 'POST',
            body: JSON.stringify({ current_password: current, new_password: newPwd }),
        });
        toast('密码已更新', 'success');
        document.getElementById('currentPassword').value = '';
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmPassword').value = '';
    } catch (err) {
        toast(err.message, 'error');
    }
}

// ═══════════════════════════════════════════════════════
// MODAL HELPERS
// ═══════════════════════════════════════════════════════
function openModal(id) {
    document.getElementById(id).classList.add('active');
}

function closeModal(id) {
    document.getElementById(id).classList.remove('active');
}

// Close on backdrop click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', (e) => {
        if (e.target === overlay) overlay.classList.remove('active');
    });
});

// Close on Escape
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        document.querySelectorAll('.modal-overlay.active').forEach(m => m.classList.remove('active'));
    }
});

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
function toast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = message;
    container.appendChild(el);

    setTimeout(() => {
        el.classList.add('exit');
        setTimeout(() => el.remove(), 200);
    }, 3000);
}

// ═══════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════
function copySubscriptionUrl() {
    const url = document.getElementById('subscriptionUrl').value;
    navigator.clipboard.writeText(url).then(
        () => toast('订阅链接已复制', 'success'),
        () => toast('复制失败', 'error')
    );
}

function setButtonLoading(btn, loading) {
    if (loading) {
        btn.classList.add('btn-loading');
        btn.disabled = true;
    } else {
        btn.classList.remove('btn-loading');
        btn.disabled = false;
    }
}

function formatDateTime(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleString('zh-CN', {
        month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit',
    });
}

function formatDate(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' });
}

function statusText(s) {
    return { active: '进行中', cancelled: '已取消', expired: '已过期' }[s] || s;
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// ═══════════════════════════════════════════════════════
// RECURRENCE UI HANDLERS
// ═══════════════════════════════════════════════════════
function handleRecurrencePresetChange() {
    const preset = document.getElementById('recurrencePreset').value;
    const custom = document.getElementById('recurrenceCustom');

    if (preset === 'custom') {
        custom.style.display = 'block';
        handleRecurrenceFreqChange(); // Initialize weekday selector display
    } else {
        custom.style.display = 'none';
    }
}

function handleRecurrenceFreqChange() {
    const freq = document.getElementById('recurrenceFreq').value;
    const bydaySelector = document.getElementById('bydaySelector');

    if (freq === 'WEEKLY') {
        bydaySelector.style.display = 'block';
    } else {
        bydaySelector.style.display = 'none';
    }
}

function handleRecurrenceEndTypeChange() {
    const endType = document.getElementById('recurrenceEndType').value;
    const endDate = document.getElementById('recurrenceEndDate');
    const endCount = document.getElementById('recurrenceEndCount');

    endDate.style.display = endType === 'date' ? 'block' : 'none';
    endCount.style.display = endType === 'count' ? 'block' : 'none';
}

// Listen for frequency changes
document.addEventListener('DOMContentLoaded', function() {
    const freqSelect = document.getElementById('recurrenceFreq');
    if (freqSelect) {
        freqSelect.addEventListener('change', handleRecurrenceFreqChange);
    }
});
